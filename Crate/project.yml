name: Crate
options:
  bundleIdPrefix: com.crate
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ru
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

targets:
  Crate:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Crate
        excludes:
          - "**/.DS_Store"
      - path: Resources
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "Crate.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crate.vinyl
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: CrateWidget
        embed: true
  CrateWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CrateWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crate.vinyl.widget
        INFOPLIST_FILE: CrateWidget/Info.plist
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
